<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>F.R.I.D.A.Y</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Boot overlay -->
  <div id="boot-overlay">
    <div id="boot-lines"></div>
    <span id="boot-cursor"></span>
  </div>

  <!-- Background -->
  <div class="bg-glow"></div>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="hud">

    <!-- LEFT — Orb + Status -->
    <div class="left-panel">
      <div class="title">F · R · I · D · A · Y &nbsp;// &nbsp; V 4.1.0</div>

      <div class="orb-wrap" id="orb">
        <div class="ring ring-1"></div>
        <div class="ring ring-2"></div>
        <div class="ring ring-3"></div>
        <div class="core">
          <span class="core-letter">F</span>
        </div>
      </div>

      <div class="wave-wrap" id="wave"></div>

      <div class="status-wrap">
        <div class="status-label">SYSTEM STATUS</div>
        <div id="status-text">INITIALIZING</div>
      </div>

      <div class="metrics">
        <div class="metric">
          <span class="metric-val" id="m-uptime">00:00</span>
          <span class="metric-lbl">UPTIME</span>
        </div>
        <div class="metric">
          <span class="metric-val" id="m-cmds">0</span>
          <span class="metric-lbl">COMMANDS</span>
        </div>
        <div class="metric">
          <span class="metric-val" id="m-time">--:--</span>
          <span class="metric-lbl">LOCAL TIME</span>
        </div>
      </div>

      <!-- Mic button -->
      <button id="mic-btn" title="Click to speak">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3zm-1 3a1 1 0 0 1 2 0v8a1 1 0 0 1-2 0V4zM7 11a5 5 0 0 0 10 0h2a7 7 0 0 1-6 6.92V21h-2v-3.08A7 7 0 0 1 5 11h2z"/>
        </svg>
      </button>
    </div>

    <!-- RIGHT — Chat -->
    <div class="chat-panel">
      <div class="chat-header">
        <div class="chat-header-left">
          <span>CHAT INTERFACE</span>
        </div>
        <span id="voice-label" style="font-size:9px;opacity:0.5">WEB VOICE</span>
      </div>

      <!-- API key banner -->
      <div id="api-banner">
        Enter your free Gemini API key to activate FRIDAY's brain.<br>
        Get one free at <span style="color:var(--gold)">aistudio.google.com</span>
        <input id="key-input" type="password" placeholder="AIza..." autocomplete="off" />
        <button id="key-save-btn">ACTIVATE</button>
      </div>

      <div class="chat-messages" id="chat-msgs"></div>

      <div class="chat-input-wrap">
        <input id="chat-input" type="text" placeholder="Type a command or ask anything..." autocomplete="off" />
        <button id="send-btn">SEND</button>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
